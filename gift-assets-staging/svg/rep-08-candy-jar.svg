  <path d="M 400 380 Q 412 374 430 372 L 594 372 Q 612 374 624 380 Z" fill="#D8CBB0"/>
  <path d="M 426 372 Q 426 330 512 330 Q 598 330 598 372 Z" fill="#F4EEE0" stroke="#D8CBB0" stroke-width="5"/>
