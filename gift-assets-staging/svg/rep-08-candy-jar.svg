  <circle cx="300" cy="724" r="17" fill="#D9A856"/>
  <circle cx="295" cy="719" r="5" fill="#EFCB8B"/>
  <ellipse cx="300" cy="744" rx="16" ry="4" fill="#D8C8A4" opacity="0.7"/>
