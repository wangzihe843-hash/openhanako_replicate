    </g>
    <!-- candy shine dots -->
    <circle cx="422" cy="632" r="7" fill="#F6C6CB"/>
    <circle cx="492" cy="648" r="7" fill="#EFCB8B"/>
    <circle cx="564" cy="634" r="7" fill="#C8E6DD"/>
