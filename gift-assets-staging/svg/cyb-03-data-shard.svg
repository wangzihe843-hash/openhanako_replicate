  <circle cx="512" cy="470" r="300" fill="#E9F2F3" opacity="0.5"/>
  <circle cx="512" cy="470" r="228" fill="#DFEEF0" opacity="0.55"/>
  <circle cx="512" cy="470" r="158" fill="#D4E8EA" opacity="0.6"/>
  <!-- ground -->
  <ellipse cx="512" cy="742" rx="200" ry="14" fill="#EADBBD"/>
