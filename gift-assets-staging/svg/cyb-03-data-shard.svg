    <path d="M452 260 H572 L627 315 V625 L572 680 H452 L397 625 V315 Z" fill="#BFDFE2"/>
    <path d="M452 260 H572 L627 315 V625 L572 680 H512 V260 Z" fill="#ADD3D7"/>
    <path d="M464 282 H560 L605 327 V613 L560 658 H464 L419 613 V327 Z" fill="#D8ECEE"/>
    <!-- facet lines -->
    <path d="M452 260 L464 282 M572 260 L560 282 M627 315 L605 327 M627 625 L605 613 M572 680 L560 658 M452 680 L464 658 M397 625 L419 613 M397 315 L419 327" stroke="#9CCBCF" stroke-width="3" opacity="0.8" fill="none"/>
    <!-- glowing core -->
    <rect x="468" y="324" width="88" height="292" rx="14" fill="#FFFFFF" opacity="0.55"/>
    <rect x="482" y="340" width="60" height="260" rx="10" fill="#FFFFFF" opacity="0.9"/>
    <!-- circuit traces -->
    <g stroke="#C77DA6" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M512 366 V592"/>
      <path d="M512 422 H546 V468"/>
      <path d="M512 506 H480 V544"/>
      <path d="M512 466 H530"/>
    </g>
    <g fill="#C77DA6">
      <rect x="504" y="350" width="16" height="16" rx="4"/>
      <circle cx="546" cy="471" r="5.5"/>
      <circle cx="480" cy="547" r="5.5"/>
      <rect x="528" y="460" width="12" height="12" rx="3"/>
      <circle cx="512" cy="595" r="5.5"/>
    </g>
    <!-- edge highlights -->
    <path d="M433 320 L455 296" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <path d="M428 350 V470" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <path d="M598 560 V612" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- rim -->
    <path d="M452 260 H572 L627 315 V625 L572 680 H452 L397 625 V315 Z" fill="none" stroke="#7FB8BF" stroke-width="5"/>
  </g>
  <!-- sparkle -->
  <path d="M668 280 l6 18 18 6 -18 6 -6 18 -6 -18 -18 -6 18 -6 Z" fill="#C77DA6" opacity="0.7"/>
