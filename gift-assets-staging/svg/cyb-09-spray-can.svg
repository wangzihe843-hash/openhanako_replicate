<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow -->
  <path d="M 560 280 L 648 296 L 678 700 L 580 730 L 552 706 Z" fill="#F1E3C9"/>
  <!-- ground contact -->
  <ellipse cx="512" cy="740" rx="180" ry="15" fill="#EADBBD"/>

  <!-- spray mist puff (left of nozzle) -->
  <g fill="#C77DA6">
    <circle cx="338" cy="252" r="9" opacity="0.5"/>
    <circle cx="310" cy="268" r="7" opacity="0.4"/>
    <circle cx="356" cy="232" r="6" opacity="0.45"/>
    <circle cx="290" cy="246" r="5" opacity="0.3"/>
  </g>

  <!-- nozzle -->
  <rect x="478" y="232" width="44" height="46" rx="10" fill="#8F96A1"/>
  <rect x="478" y="232" width="18" height="46" rx="9" fill="#C9CDD4"/>
  <rect x="466" y="244" width="18" height="16" rx="6" fill="#5F6671"/>
  <!-- cap ring -->
  <path d="M 432 296 Q 432 272 462 268 L 542 268 Q 572 272 572 296 L 572 318 L 432 318 Z" fill="#C77DA6"/>
  <path d="M 432 296 Q 432 272 462 268 L 500 268 L 496 318 L 432 318 Z" fill="#D898BC"/>
  <rect x="424" y="312" width="156" height="20" rx="9" fill="#A9618B"/>

  <!-- can body -->
  <path d="M 428 332 L 596 332 L 588 700 Q 512 714 436 700 Z" fill="#C9CDD4"/>
  <path d="M 428 332 L 480 332 L 482 706 Q 454 704 436 700 Z" fill="#E3E6EB"/>
  <path d="M 596 332 L 548 332 L 550 708 Q 574 706 588 700 Z" fill="#A9AFB8"/>
  <!-- top shoulder rings -->
  <path d="M 432 348 Q 512 360 592 348" fill="none" stroke="#8F96A1" stroke-width="5"/>
  <path d="M 434 364 Q 512 376 590 364" fill="none" stroke="#E3E6EB" stroke-width="4"/>

  <!-- abstract graffiti splash label (no letters) -->
  <g>
    <path d="M 462 470 Q 448 432 488 426 Q 502 400 534 414 Q 568 402 576 438 Q 606 450 588 482 Q 600 514 564 520 Q 548 544 516 530 Q 478 542 470 506 Q 444 496 462 470 Z" fill="#C77DA6"/>
    <path d="M 478 466 Q 470 442 496 438 Q 506 420 528 430 Q 552 422 556 446 Q 576 456 564 476 Q 572 498 548 502 Q 536 518 514 508 Q 488 516 484 492 Q 468 484 478 466 Z" fill="#E5B3CC"/>
    <!-- paint drips from splash -->
    <path d="M 488 522 Q 484 556 490 578 Q 498 570 496 526 Z" fill="#C77DA6"/>
    <path d="M 548 516 Q 546 542 552 558 Q 558 550 556 518 Z" fill="#A9618B"/>
    <!-- cyan accent dots -->
    <circle cx="510" cy="468" r="13" fill="#7FB8BF"/>
    <circle cx="506" cy="464" r="5" fill="#A8D8DC"/>
  </g>

  <!-- bottom rim -->
  <path d="M 436 686 Q 512 700 588 686 L 588 700 Q 512 714 436 700 Z" fill="#8F96A1"/>
  <!-- body highlight -->
  <path d="M 466 356 Q 462 500 468 660" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

  <!-- sparkle -->
  <path d="M 690 350 L 696 366 L 712 372 L 696 378 L 690 394 L 684 378 L 668 372 L 684 366 Z" fill="#C77DA6" opacity="0.9"/>
</svg>
