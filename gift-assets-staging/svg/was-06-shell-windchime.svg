    <rect x="-17" y="4" width="34" height="12" rx="5" fill="#A8762F"/>
    <path d="M-14,12 h28 v58 a14,20 0 0 1 -28,0 z" fill="#C28F3F"/>
    <path d="M-14,12 h9 v70 a14,20 0 0 1 -9,-12 z" fill="#D9A856"/>
