  <line x1="572" y1="366" x2="572" y2="612" stroke="#97856B" stroke-width="3.5"/>
  <line x1="632" y1="356" x2="632" y2="560" stroke="#97856B" stroke-width="3.5"/>
  <circle cx="392" cy="358" r="5" fill="#8C6239"/>
  <circle cx="452" cy="368" r="5" fill="#8C6239"/>
  <circle cx="512" cy="372" r="5" fill="#8C6239"/>
  <circle cx="572" cy="368" r="5" fill="#8C6239"/>
  <circle cx="632" cy="358" r="5" fill="#8C6239"/>

