  <!-- wooden stand block -->
  <rect x="408" y="724" width="208" height="58" rx="16" fill="#A87844"/>
  <rect x="408" y="724" width="208" height="24" rx="12" fill="#C09058"/>
  <path d="M 432 762 L 472 762 M 540 768 L 590 768" stroke="#8C6239" stroke-width="3" stroke-linecap="round"/>

  <!-- brass screw base -->
  <rect x="464" y="620" width="96" height="110" rx="14" fill="#C28F3F"/>
