  <path d="M 420 360 Q 402 400 404 452" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.75"/>
  <path d="M 438 322 Q 452 306 474 298" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- drifting warm sparkles -->
  <path d="M 690 300 L 696 316 L 712 322 L 696 328 L 690 344 L 684 328 L 668 322 L 684 316 Z" fill="#E5C878"/>
  <circle cx="332" cy="280" r="6" fill="#E5C878" opacity="0.8"/>
