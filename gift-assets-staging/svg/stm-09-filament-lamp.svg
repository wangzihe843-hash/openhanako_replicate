    <line x1="488" y1="608" x2="488" y2="498"/>
    <line x1="536" y1="608" x2="536" y2="498"/>
  </g>
  <path d="M 488 498 L 472 468 L 504 438 L 480 408 L 512 378 L 544 408 L 520 438 L 552 468 L 536 498"
