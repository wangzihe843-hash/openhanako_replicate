  <!-- rim -->
  <path d="M 512 232 C 610 232 676 290 676 380 C 676 500 610 626 512 700 C 414 626 348 500 348 380 C 348 290 414 232 512 232 Z"
        fill="none" stroke="#5C8278" stroke-width="8"/>
  <!-- ridge line -->
  <path d="M 512 252 Q 512 480 512 676" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.35"/>
  <path d="M 506 260 Q 506 470 506 660" fill="none" stroke="#5C8278" stroke-width="3" opacity="0.4"/>
  <!-- highlight crescent -->
  <path d="M 414 312 Q 392 368 396 432" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
  <!-- shimmer streaks -->
  <g stroke="#FFFFFF" stroke-linecap="round" opacity="0.5">
    <line x1="560" y1="330" x2="600" y2="288" stroke-width="7"/>
    <line x1="588" y1="352" x2="612" y2="326" stroke-width="5"/>
    <line x1="440" y1="560" x2="466" y2="530" stroke-width="5"/>
  </g>

  <!-- sparkles -->
  <path d="M 668 240 L 674 256 L 690 262 L 674 268 L 668 284 L 662 268 L 646 262 L 662 256 Z" fill="#C8E6DD"/>
  <circle cx="350" cy="240" r="6" fill="#C7B3DC" opacity="0.8"/>
