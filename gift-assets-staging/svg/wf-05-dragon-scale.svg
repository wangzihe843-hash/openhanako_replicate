    <path d="M 330 720 Q 512 620 694 720 L 694 540 Q 512 466 330 540 Z" fill="#A98BC4"/>
    <path d="M 420 690 Q 512 740 626 668 L 626 760 L 420 760 Z" fill="#8E6FB1"/>
