  <g clip-path="url(#scale)">
    <path d="M 330 320 Q 512 250 694 320 L 694 230 L 330 230 Z" fill="#9CCFC4"/>
    <path d="M 330 430 Q 512 360 694 430 L 694 308 Q 512 240 330 308 Z" fill="#8FB3B8"/>
