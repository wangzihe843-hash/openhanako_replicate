  <line x1="420" y1="662" x2="420" y2="704" stroke="#8F96A1" stroke-width="3"/>
  <ellipse cx="400" cy="708" rx="40" ry="5" fill="#3E332C" opacity="0.14"/>

  <!-- body -->
  <path d="M 366 648 C 362 556, 360 462, 366 372 L 370 322 L 430 322 L 434 372 C 440 462, 438 556, 434 648 Z" fill="#C9CDD4"/>
