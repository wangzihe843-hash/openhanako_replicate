    <rect x="534" y="496" width="116" height="150" rx="12" fill="#6E7FA8"/>
    <circle cx="592" cy="548" r="22" fill="#E5C878"/>
    <path d="M 577 534 A 22 22 0 0 1 593 526" fill="none" stroke="#FBF2D9" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <ellipse cx="592" cy="548" rx="37" ry="11" fill="none" stroke="#C28F3F" stroke-width="5" transform="rotate(-20 592 548)"/>
    <rect x="552" y="598" width="80" height="9" rx="4.5" fill="#C7D2E8"/>
    <rect x="552" y="616" width="52" height="9" rx="4.5" fill="#C9574C"/>
    <!-- bottom crease -->
    <path d="M 524 676 L 660 676" stroke="#6E7FA8" stroke-width="3" opacity="0.6"/>
    <!-- pouch highlight -->
    <path d="M 548 486 C 544 560, 544 620, 548 682" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  </g>
  <!-- occlusion under pouch -->
  <ellipse cx="612" cy="706" rx="80" ry="7" fill="#3E332C" opacity="0.13"/>
