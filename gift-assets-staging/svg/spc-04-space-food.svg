  <path d="M 387 484 A 18 18 0 0 1 401 478" fill="none" stroke="#FBF2D9" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <ellipse cx="400" cy="496" rx="31" ry="9" fill="none" stroke="#C28F3F" stroke-width="5" transform="rotate(-20 400 496)"/>
