  <rect x="346" y="302" width="108" height="20" rx="5" fill="#8F96A1"/>
  <rect x="346" y="302" width="108" height="7" rx="3.5" fill="#A9AFB8"/>
  <line x1="376" y1="306" x2="376" y2="318" stroke="#6E747D" stroke-width="3"/>
  <line x1="400" y1="306" x2="400" y2="318" stroke="#6E747D" stroke-width="3"/>
  <line x1="424" y1="306" x2="424" y2="318" stroke="#6E747D" stroke-width="3"/>
  <path d="M 370 324 L 430 324" stroke="#3E332C" stroke-width="4" opacity="0.15"/>

  <!-- label band -->
  <path d="M 362 420 L 438 420 C 440 472, 440 510, 438 552 L 362 552 C 360 510, 360 472, 362 420 Z" fill="#6E7FA8"/>
  <path d="M 362 420 L 438 420 C 439 436, 439 444, 439 452 L 361 452 C 361 444, 361 436, 362 420 Z" fill="#8E9FC4"/>
