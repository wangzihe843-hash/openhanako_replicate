    <path d="M 510 446 Q 510 430 528 430 L 656 430 Q 674 430 674 446 L 674 460 L 510 460 Z" fill="#C9CDD4"/>
    <line x1="510" y1="464" x2="674" y2="464" stroke="#8F96A1" stroke-width="4"/>
    <line x1="544" y1="436" x2="544" y2="456" stroke="#A9AFB8" stroke-width="3"/>
    <line x1="566" y1="436" x2="566" y2="456" stroke="#A9AFB8" stroke-width="3"/>
    <line x1="618" y1="436" x2="618" y2="456" stroke="#A9AFB8" stroke-width="3"/>
    <line x1="640" y1="436" x2="640" y2="456" stroke="#A9AFB8" stroke-width="3"/>
    <!-- tear notches -->
    <path d="M 510 444 L 521 449 L 510 454 Z" fill="#6E7FA8"/>
    <path d="M 674 444 L 663 449 L 674 454 Z" fill="#6E7FA8"/>
