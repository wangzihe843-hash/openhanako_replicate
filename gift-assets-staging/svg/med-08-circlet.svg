  <path d="M 512 344 L 546 416 Q 528 410 512 408 Z" fill="#C28F3F"/>
  <circle cx="512" cy="398" r="18" fill="#A8762F"/>
  <path d="M 512 385 L 525 398 L 512 411 L 499 398 Z" fill="#A8485C"/>
  <path d="M 512 385 L 525 398 L 512 401 Z" fill="#C9707F"/>
  <circle cx="512" cy="340" r="9" fill="#D9A856"/>
  <circle cx="510" cy="338" r="3.5" fill="#EFCB8B"/>

