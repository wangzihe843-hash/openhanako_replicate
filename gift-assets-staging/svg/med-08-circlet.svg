  <path d="M 370 448 A 146 52 0 0 1 448 412" fill="none" stroke="#D9A856" stroke-width="10" stroke-linecap="round"/>
  <path d="M 654 476 A 146 52 0 0 1 580 510" fill="none" stroke="#A8762F" stroke-width="8" stroke-linecap="round"/>
  <!-- occlusion under circlet -->
  <ellipse cx="512" cy="520" rx="130" ry="14" fill="#8F3A4C" opacity="0.55"/>

  <!-- center peak with gem -->
