  <g fill="#D9A856">
    <path d="M 416 432 Q 400 412 410 394 Q 426 406 426 426 Z"/>
    <path d="M 608 432 Q 624 412 614 394 Q 598 406 598 426 Z"/>
  </g>
  <!-- small pearls on band -->
  <circle cx="372" cy="450" r="7" fill="#F6EFE2"/>
  <circle cx="370" cy="448" r="2.6" fill="#FFFDF7"/>
  <circle cx="652" cy="450" r="7" fill="#F6EFE2"/>
  <circle cx="650" cy="448" r="2.6" fill="#FFFDF7"/>

  <!-- sparkle -->
