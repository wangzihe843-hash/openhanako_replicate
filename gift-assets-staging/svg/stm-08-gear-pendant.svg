<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- soft diagonal cast shadow -->
  <path d="M 556 392 Q 624 388 646 452 Q 676 560 640 660 Q 600 720 540 700 Q 520 600 528 480 Q 534 420 556 392 Z" fill="#F1E3C9"/>
  <!-- ground contact -->
  <ellipse cx="512" cy="752" rx="170" ry="14" fill="#EADBBD"/>

  <!-- necklace chain (hangs from top) -->
  <g stroke="#C28F3F" stroke-width="5" fill="none" stroke-dasharray="10 6">
    <path d="M 388 150 Q 420 270 478 350"/>
    <path d="M 636 150 Q 604 270 546 350"/>
  </g>
  <!-- chain bail -->
  <circle cx="512" cy="364" r="20" fill="none" stroke="#D9A856" stroke-width="10"/>
  <path d="M 498 376 A 20 20 0 0 0 512 384" fill="none" stroke="#A8762F" stroke-width="5"/>

  <!-- big gear -->
  <g>
    <g fill="#C28F3F">
      <rect x="496" y="386" width="32" height="30" rx="6"/>
      <rect x="496" y="678" width="32" height="30" rx="6"/>
      <rect x="350" y="532" width="30" height="32" rx="6"/>
      <rect x="644" y="532" width="30" height="32" rx="6"/>
      <g transform="rotate(45 512 548)">
        <rect x="496" y="386" width="32" height="30" rx="6"/>
        <rect x="496" y="678" width="32" height="30" rx="6"/>
        <rect x="350" y="532" width="30" height="32" rx="6"/>
        <rect x="644" y="532" width="30" height="32" rx="6"/>
      </g>
      <g transform="rotate(22.5 512 548)">
        <rect x="496" y="386" width="32" height="30" rx="6"/>
        <rect x="496" y="678" width="32" height="30" rx="6"/>
        <rect x="350" y="532" width="30" height="32" rx="6"/>
        <rect x="644" y="532" width="30" height="32" rx="6"/>
      </g>
      <g transform="rotate(-22.5 512 548)">
        <rect x="496" y="386" width="32" height="30" rx="6"/>
        <rect x="496" y="678" width="32" height="30" rx="6"/>
        <rect x="350" y="532" width="30" height="32" rx="6"/>
        <rect x="644" y="532" width="30" height="32" rx="6"/>
      </g>
    </g>
    <circle cx="512" cy="548" r="138" fill="#D9A856"/>
    <path d="M 396 478 A 136 136 0 0 1 512 410" fill="none" stroke="#EFCB8B" stroke-width="10" stroke-linecap="round"/>
    <circle cx="512" cy="548" r="138" fill="none" stroke="#A8762F" stroke-width="6"/>
    <!-- spoke cutouts -->
    <g fill="#C28F3F">
      <circle cx="512" cy="478" r="22"/>
      <circle cx="578" cy="586" r="22"/>
      <circle cx="446" cy="586" r="22"/>
    </g>
    <circle cx="512" cy="548" r="64" fill="#C28F3F"/>
    <circle cx="512" cy="548" r="64" fill="none" stroke="#A8762F" stroke-width="4"/>
  </g>

  <!-- small overlapping gear -->
  <g>
    <g fill="#A9AFB8">
      <rect x="608" y="396" width="22" height="22" rx="5"/>
      <rect x="608" y="556" width="22" height="22" rx="5"/>
      <rect x="528" y="476" width="22" height="22" rx="5" transform="translate(0 0)"/>
      <rect x="688" y="476" width="22" height="22" rx="5"/>
      <g transform="rotate(45 619 487)">
        <rect x="608" y="396" width="22" height="22" rx="5"/>
        <rect x="608" y="556" width="22" height="22" rx="5"/>
        <rect x="528" y="476" width="22" height="22" rx="5"/>
        <rect x="688" y="476" width="22" height="22" rx="5"/>
