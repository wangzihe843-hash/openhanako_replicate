    <circle cx="619" cy="487" r="74" fill="#C9CDD4"/>
    <path d="M 560 450 A 70 70 0 0 1 614 414" fill="none" stroke="#E3E6EB" stroke-width="7" stroke-linecap="round"/>
    <circle cx="619" cy="487" r="74" fill="none" stroke="#8F96A1" stroke-width="5"/>
    <circle cx="619" cy="487" r="28" fill="#8F96A1"/>
    <circle cx="619" cy="487" r="14" fill="#C9CDD4"/>
  </g>

  <!-- ruby jewel at big gear center -->
  <circle cx="512" cy="548" r="34" fill="#A8362E"/>
  <path d="M 512 522 L 534 548 L 512 574 L 490 548 Z" fill="#C9574C"/>
  <path d="M 512 522 L 534 548 L 512 552 Z" fill="#E8766B"/>
  <circle cx="503" cy="538" r="5" fill="#F2A79E"/>

  <!-- sparkle -->
  <path d="M 352 300 L 358 316 L 374 322 L 358 328 L 352 344 L 346 328 L 330 322 L 346 316 Z" fill="#E5C878"/>
