<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAE8D1"/>
  <!-- ground shadow -->
  <ellipse cx="512" cy="744" rx="215" ry="17" fill="#F2CB9C" opacity="0.85"/>

  <!-- open lid (behind, showing inner face) -->
  <rect x="352" y="252" width="320" height="216" rx="62" fill="#F1E6CF" stroke="#7A5638" stroke-width="9"/>
  <rect x="388" y="288" width="248" height="146" rx="42" fill="#FBF4E3"/>
  <path d="M 400 320 Q 404 296 436 290" fill="none" stroke="#FFFDF4" stroke-width="9" stroke-linecap="round" opacity="0.9"/>

  <!-- hinge -->
  <rect x="384" y="452" width="256" height="30" rx="14" fill="#C9B28C" stroke="#7A5638" stroke-width="8"/>

  <!-- base -->
  <rect x="352" y="474" width="320" height="232" rx="56" fill="#F1E6CF" stroke="#7A5638" stroke-width="9"/>
  <!-- cavity -->
  <rect x="386" y="482" width="252" height="134" rx="38" fill="#D8C19B"/>
  <rect x="386" y="482" width="252" height="24" rx="12" fill="#B89E74" opacity="0.75"/>

  <!-- molded wells -->
  <g transform="translate(448 520) rotate(18)">
    <rect x="-27" y="-46" width="54" height="146" rx="27" fill="#BFA67C"/>
  </g>
  <g transform="translate(576 520) rotate(-18)">
    <rect x="-27" y="-46" width="54" height="146" rx="27" fill="#BFA67C"/>
  </g>

  <!-- earbuds seated in wells: head + stem tilted outward -->
  <g transform="translate(448 520) rotate(18)">
    <rect x="-13" y="20" width="26" height="64" rx="13" fill="#FFFDF6" stroke="#7A5638" stroke-width="8"/>
    <circle cx="0" cy="0" r="38" fill="#FFFDF6" stroke="#7A5638" stroke-width="8"/>
    <path d="M -20 22 Q 0 34 20 22" fill="none" stroke="#E3D8BF" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g transform="translate(576 520) rotate(-18)">
    <rect x="-13" y="20" width="26" height="64" rx="13" fill="#FFFDF6" stroke="#7A5638" stroke-width="8"/>
    <circle cx="0" cy="0" r="38" fill="#FFFDF6" stroke="#7A5638" stroke-width="8"/>
    <path d="M -20 22 Q 0 34 20 22" fill="none" stroke="#E3D8BF" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- pairing light near bottom edge -->
  <circle cx="512" cy="674" r="8" fill="#E2949D"/>
  <!-- base highlight -->
  <path d="M 376 540 Q 372 600 384 656" fill="none" stroke="#FFFDF4" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
</svg>
