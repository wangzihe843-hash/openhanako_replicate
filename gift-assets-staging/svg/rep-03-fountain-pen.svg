  <path d="M320,712 Q420,706 520,712 T720,710" stroke="#8C6239" stroke-width="3" fill="none" opacity="0.55"/>
  <path d="M330,736 Q450,742 560,736 T712,738" stroke="#8C6239" stroke-width="3" fill="none" opacity="0.45"/>
