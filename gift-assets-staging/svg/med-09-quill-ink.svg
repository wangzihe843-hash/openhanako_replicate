<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow -->
  <g fill="#F1E3C9">
    <path d="M 560 470 C 640 480 680 540 680 610 C 680 690 630 738 556 744 L 500 744 Z"/>
    <path d="M 600 220 Q 700 280 660 420 L 600 560 L 560 540 Z"/>
  </g>
  <!-- ground contact -->
  <ellipse cx="512" cy="752" rx="225" ry="16" fill="#EADBBD"/>

  <!-- ink bottle -->
  <path d="M 432 480 L 432 524 C 384 548 356 592 356 644 C 356 706 414 738 488 738 C 562 738 620 706 620 644 C 620 592 592 548 544 524 L 544 480 Z"
        fill="#F4EEE0" stroke="#D8CBB0" stroke-width="6"/>
  <clipPath id="ink"><path d="M 436 484 L 436 526 C 389 550 361 593 361 644 C 361 702 417 733 488 733 C 559 733 615 702 615 644 C 615 593 587 550 540 526 L 540 484 Z"/></clipPath>
  <g clip-path="url(#ink)">
    <path d="M 350 580 Q 430 562 488 574 Q 552 586 626 570 L 626 745 L 350 745 Z" fill="#4E5A74"/>
    <path d="M 540 578 Q 580 580 626 570 L 626 745 L 480 745 Q 560 680 540 578 Z" fill="#3F4A60"/>
    <path d="M 360 592 Q 430 574 488 584 Q 550 594 616 580 L 616 600 Q 552 612 488 602 Q 428 594 360 610 Z" fill="#6B7A94" opacity="0.8"/>
  </g>
  <!-- open inkwell neck collar -->
  <rect x="420" y="462" width="136" height="26" rx="11" fill="#D8CBB0"/>
  <ellipse cx="488" cy="464" rx="58" ry="13" fill="#C9BBA0"/>
  <ellipse cx="488" cy="462" rx="44" ry="9" fill="#3F4A60"/>
  <!-- glass highlights -->
  <path d="M 398 560 Q 380 596 380 640" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M 412 532 Q 424 520 442 514" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

  <!-- quill feather (diagonal, nib down-left toward bottle) -->
  <g transform="rotate(24 600 400)">
    <!-- shaft -->
    <path d="M 600 130 L 606 130 Q 612 420 596 600 L 590 600 Q 590 420 600 130 Z" fill="#D9CBAE"/>
    <!-- feather vane -->
    <path d="M 602 140 C 666 200 690 300 668 420 Q 640 440 612 444 L 604 300 Z" fill="#F2EFE6"/>
    <path d="M 602 140 C 666 200 690 300 668 420 Q 654 430 638 436 Q 660 320 626 200 Q 614 166 602 140 Z" fill="#E4DFD2"/>
    <path d="M 600 150 C 548 210 530 300 546 412 Q 572 436 596 442 L 600 300 Z" fill="#F7F4EC"/>
    <!-- barb lines -->
    <g stroke="#DDD8CC" stroke-width="3" stroke-linecap="round">
      <path d="M 604 220 Q 636 226 652 248"/>
      <path d="M 604 280 Q 640 288 658 312"/>
      <path d="M 603 340 Q 638 350 656 374"/>
      <path d="M 601 230 Q 572 238 558 262"/>
      <path d="M 601 295 Q 568 304 554 330"/>
      <path d="M 600 355 Q 570 364 558 388"/>
    </g>
    <!-- vane notch -->
    <path d="M 660 360 Q 648 376 650 396 Q 664 388 668 368 Z" fill="#FAF3E6"/>
    <!-- gold nib -->
    <path d="M 590 600 L 596 600 Q 606 636 596 668 Q 593 676 590 668 Q 582 636 590 600 Z" fill="#D9A856"/>
    <path d="M 593 600 L 596 600 Q 604 636 596 664 L 593 664 Z" fill="#C28F3F"/>
    <line x1="593" y1="620" x2="593" y2="650" stroke="#A8762F" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ink drop at nib -->
  <path d="M 700 652 Q 692 668 700 678 Q 710 670 706 656 Z" fill="#4E5A74"/>

  <!-- sparkle -->
  <path d="M 320 320 L 326 336 L 342 342 L 326 348 L 320 364 L 314 348 L 298 342 L 314 336 Z" fill="#E5C878"/>
</svg>
