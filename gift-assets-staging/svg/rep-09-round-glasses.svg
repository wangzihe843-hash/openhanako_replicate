<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow -->
  <g fill="#F1E3C9">
    <circle cx="416" cy="568" r="128"/>
    <circle cx="688" cy="568" r="128"/>
    <rect x="416" y="500" width="272" height="120" rx="40"/>
  </g>
  <!-- ground contact -->
  <ellipse cx="512" cy="724" rx="260" ry="15" fill="#EADBBD"/>

  <!-- folded temple arms (behind lenses) -->
  <path d="M 250 530 Q 420 430 700 470" fill="none" stroke="#C28F3F" stroke-width="9" stroke-linecap="round"/>
  <path d="M 250 530 Q 240 540 248 552" fill="none" stroke="#C28F3F" stroke-width="9" stroke-linecap="round"/>
  <path d="M 770 530 Q 600 438 330 480" fill="none" stroke="#D9A856" stroke-width="9" stroke-linecap="round"/>
  <path d="M 770 530 Q 782 540 774 554" fill="none" stroke="#D9A856" stroke-width="9" stroke-linecap="round"/>

  <!-- left lens -->
  <circle cx="386" cy="546" r="118" fill="#EFF3F0" opacity="0.9"/>
  <circle cx="386" cy="546" r="118" fill="none" stroke="#D9A856" stroke-width="11"/>
  <circle cx="386" cy="546" r="106" fill="none" stroke="#C28F3F" stroke-width="3" opacity="0.7"/>
  <!-- right lens -->
  <circle cx="638" cy="546" r="118" fill="#EFF3F0" opacity="0.9"/>
  <circle cx="638" cy="546" r="118" fill="none" stroke="#D9A856" stroke-width="11"/>
  <circle cx="638" cy="546" r="106" fill="none" stroke="#C28F3F" stroke-width="3" opacity="0.7"/>

  <!-- bridge -->
  <path d="M 498 510 Q 512 492 526 510" fill="none" stroke="#D9A856" stroke-width="11" stroke-linecap="round"/>
  <path d="M 500 524 Q 512 510 524 524" fill="none" stroke="#C28F3F" stroke-width="5" stroke-linecap="round"/>

  <!-- lens reflections -->
  <path d="M 322 478 L 398 454 L 350 560 L 296 560 Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M 416 470 L 444 462 L 372 620 L 348 608 Z" fill="#FFFFFF" opacity="0.35"/>
  <path d="M 574 478 L 650 454 L 602 560 L 548 560 Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M 668 470 L 696 462 L 624 620 L 600 608 Z" fill="#FFFFFF" opacity="0.35"/>

  <!-- nose pads -->
  <circle cx="478" cy="556" r="9" fill="#EFCB8B"/>
  <circle cx="546" cy="556" r="9" fill="#EFCB8B"/>

  <!-- hinge dots -->
  <circle cx="268" cy="538" r="7" fill="#C28F3F"/>
  <circle cx="756" cy="538" r="7" fill="#C28F3F"/>

  <!-- sparkle -->
  <path d="M 762 330 L 768 346 L 784 352 L 768 358 L 762 374 L 756 358 L 740 352 L 756 346 Z" fill="#E5C878"/>
</svg>
