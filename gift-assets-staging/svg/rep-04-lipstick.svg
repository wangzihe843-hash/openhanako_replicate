<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow -->
  <g fill="#F1E3C9">
    <path d="M 510 360 L 610 332 L 658 736 L 558 752 Z"/>
    <rect x="664" y="664" width="190" height="84" rx="40"/>
  </g>
  <!-- ground contact -->
  <ellipse cx="540" cy="752" rx="230" ry="15" fill="#EADBBD"/>

  <!-- lipstick tube standing -->
  <g>
    <!-- bullet -->
    <path d="M 462 414 L 562 414 L 562 348 Q 562 318 534 312 L 490 312 Q 462 318 462 348 Z" fill="#C9574C"/>
    <path d="M 522 414 L 562 414 L 562 348 Q 562 318 534 312 Q 548 332 548 360 L 548 414 Z" fill="#B83E35"/>
    <path d="M 478 330 Q 472 352 472 384" fill="none" stroke="#E8766B" stroke-width="9" stroke-linecap="round"/>
    <!-- inner rim where bullet meets tube -->
    <rect x="452" y="408" width="120" height="18" rx="7" fill="#A8762F"/>
    <!-- knurled collar -->
    <rect x="446" y="424" width="132" height="58" rx="10" fill="#D9A856"/>
    <g stroke="#C28F3F" stroke-width="3">
      <line x1="462" y1="428" x2="462" y2="478"/><line x1="480" y1="428" x2="480" y2="478"/>
      <line x1="498" y1="428" x2="498" y2="478"/><line x1="516" y1="428" x2="516" y2="478"/>
      <line x1="534" y1="428" x2="534" y2="478"/><line x1="552" y1="428" x2="552" y2="478"/>
    </g>
    <!-- tube body -->
    <rect x="452" y="482" width="120" height="256" rx="14" fill="#C28F3F"/>
    <rect x="452" y="482" width="44" height="256" rx="14" fill="#D9A856"/>
    <line x1="470" y1="496" x2="470" y2="724" stroke="#EFCB8B" stroke-width="6" stroke-linecap="round"/>
    <rect x="452" y="482" width="120" height="14" rx="7" fill="#A8762F"/>
    <!-- base ring -->
    <rect x="452" y="716" width="120" height="22" rx="10" fill="#A8762F"/>
    <line x1="464" y1="722" x2="560" y2="722" stroke="#C28F3F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- cap lying beside -->
  <g>
    <ellipse cx="752" cy="744" rx="96" ry="9" fill="#D8C8A4" opacity="0.7"/>
    <rect x="652" y="676" width="196" height="64" rx="22" fill="#C28F3F"/>
    <rect x="652" y="676" width="196" height="26" rx="13" fill="#D9A856"/>
    <ellipse cx="654" cy="708" rx="14" ry="32" fill="#A8762F"/>
    <ellipse cx="654" cy="708" rx="8" ry="24" fill="#8C5F26"/>
    <!-- cap band detail -->
    <rect x="800" y="676" width="14" height="64" rx="6" fill="#A8762F"/>
    <line x1="700" y1="684" x2="760" y2="684" stroke="#EFCB8B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- tiny sparkle -->
  <path d="M 612 264 L 617 278 L 631 283 L 617 288 L 612 302 L 607 288 L 593 283 L 607 278 Z" fill="#E8A0A8"/>
</svg>
