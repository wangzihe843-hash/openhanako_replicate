  <g stroke="#7FB8BF" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M512 418 V398"/>
    <path d="M544 434 H564"/>
    <path d="M544 466 H558 V496"/>
    <path d="M512 482 V508"/>
    <path d="M480 466 H456"/>
