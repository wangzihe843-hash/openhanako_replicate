  <circle cx="512" cy="450" r="112" fill="#FFFFFF" opacity="0.7"/>
  <!-- chip pins -->
  <g fill="#A9AFB8">
    <rect x="419" y="400" width="24" height="13" rx="4"/>
    <rect x="419" y="434" width="24" height="13" rx="4"/>
    <rect x="419" y="468" width="24" height="13" rx="4"/>
    <rect x="419" y="502" width="24" height="13" rx="4"/>
    <rect x="581" y="400" width="24" height="13" rx="4"/>
    <rect x="581" y="434" width="24" height="13" rx="4"/>
    <rect x="581" y="468" width="24" height="13" rx="4"/>
    <rect x="581" y="502" width="24" height="13" rx="4"/>
  </g>
  <!-- chip body -->
  <rect x="437" y="375" width="150" height="150" rx="12" fill="#655B72"/>
  <rect x="447" y="385" width="130" height="130" rx="8" fill="#756A85"/>
  <path d="M452 392 H560" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
