  <circle cx="512" cy="460" r="235" fill="#F5E2EC" opacity="0.55"/>
  <circle cx="512" cy="460" r="165" fill="#F2D8E6" opacity="0.6"/>
  <!-- ground -->
  <ellipse cx="512" cy="716" rx="250" ry="15" fill="#EADBBD"/>
  <!-- pedestal -->
  <rect x="326" y="684" width="372" height="34" rx="14" fill="#8F96A1"/>
  <rect x="326" y="684" width="372" height="16" rx="8" fill="#A9AFB8"/>
  <rect x="346" y="650" width="332" height="40" rx="10" fill="#A9AFB8"/>
