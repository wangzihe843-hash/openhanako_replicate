<circle cx="455" cy="470" r="21" fill="#C28F3F" stroke="#8C6239" stroke-width="5"/>
<circle cx="455" cy="470" r="7" fill="#5E4730"/>
<!-- belly occlusion above legs -->
<path d="M 430 648 Q 505 670 578 650" stroke="#8C6239" stroke-width="8" fill="none" opacity="0.45"/>
