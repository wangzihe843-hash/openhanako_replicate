<path d="M 302 462 Q 360 488 416 452" stroke="#C09058" stroke-width="5" fill="none"/>
<circle cx="318" cy="470" r="4.5" fill="#8C6239"/>
<circle cx="358" cy="480" r="4.5" fill="#8C6239"/>
<circle cx="398" cy="462" r="4.5" fill="#8C6239"/>
