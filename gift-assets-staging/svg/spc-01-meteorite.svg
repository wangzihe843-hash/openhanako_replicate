<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long shadow (rock + stand silhouette, offset 60,44) -->
  <g transform="translate(60,44)" fill="#F1E3C9">
    <path d="M 344 412 C 330 348, 376 276, 456 250 C 530 226, 614 238, 662 288 C 704 332, 714 402, 692 462 C 670 520, 616 558, 546 570 C 468 582, 396 558, 362 508 C 342 480, 350 450, 344 412 Z"/>
    <path d="M 448 540 L 576 540 L 576 622 L 596 622 Q 612 622 612 638 L 612 646 Q 612 660 596 660 L 428 660 Q 412 660 412 646 L 412 638 Q 412 622 428 622 L 448 622 Z"/>
  </g>

  <!-- ground -->
  <ellipse cx="512" cy="706" rx="215" ry="16" fill="#EADBBD"/>

  <!-- stand stem -->
  <rect x="488" y="590" width="48" height="80" rx="10" fill="#A9AFB8"/>
  <rect x="488" y="590" width="18" height="80" rx="9" fill="#C9CDD4"/>
  <line x1="494" y1="632" x2="530" y2="632" stroke="#8F96A1" stroke-width="3"/>
  <line x1="494" y1="642" x2="530" y2="642" stroke="#8F96A1" stroke-width="3"/>

  <!-- stand base -->
  <rect x="412" y="660" width="200" height="42" rx="16" fill="#A9AFB8"/>
  <rect x="412" y="660" width="200" height="14" rx="7" fill="#C9CDD4"/>
  <rect x="412" y="690" width="200" height="12" rx="6" fill="#8F96A1"/>
  <circle cx="442" cy="681" r="4.5" fill="#8F96A1"/>
  <circle cx="582" cy="681" r="4.5" fill="#8F96A1"/>
  <!-- occlusion under base -->
  <ellipse cx="512" cy="703" rx="100" ry="7" fill="#3E332C" opacity="0.14"/>

  <!-- meteorite body (irregular) -->
  <path d="M 344 412 C 330 348, 376 276, 456 250 C 492 238, 530 230, 566 242 C 600 230, 640 262, 662 288 C 704 332, 714 402, 692 462 C 684 498, 648 530, 614 548 C 580 566, 510 580, 546 570 C 468 582, 396 558, 362 508 C 342 480, 350 450, 344 412 Z" fill="#8A8076"/>
