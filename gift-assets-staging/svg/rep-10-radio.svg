<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow -->
  <path d="M 392 348 L 700 348 Q 770 348 786 420 L 800 660 Q 800 724 730 736 L 560 744 Z" fill="#F1E3C9"/>
  <!-- ground contact -->
  <ellipse cx="512" cy="744" rx="255" ry="16" fill="#EADBBD"/>

  <!-- radio cabinet (arch top) -->
  <path d="M 322 728 L 322 440 Q 322 318 512 318 Q 702 318 702 440 L 702 728 Z" fill="#A87844"/>
  <path d="M 322 728 L 322 440 Q 322 326 480 320 Q 360 340 348 446 L 348 728 Z" fill="#C09058"/>
