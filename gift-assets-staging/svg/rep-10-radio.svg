  <path d="M 342 728 L 342 446 Q 342 342 512 342 Q 682 342 682 446 L 682 728" fill="none" stroke="#8C6239" stroke-width="6"/>
  <!-- base plinth -->
  <rect x="306" y="712" width="412" height="40" rx="14" fill="#8C6239"/>
  <rect x="306" y="712" width="412" height="16" rx="8" fill="#A87844"/>
  <!-- feet -->
  <rect x="338" y="746" width="44" height="16" rx="7" fill="#6E5238"/>
  <rect x="642" y="746" width="44" height="16" rx="7" fill="#6E5238"/>

