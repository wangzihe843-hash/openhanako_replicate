<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- long cast shadow: parallel diagonal swath -->
  <path d="M 360 660 L 700 380 Q 728 360 740 388 Q 748 412 722 432 L 392 706 Q 366 726 354 700 Q 346 676 360 660 Z" fill="#F1E3C9"/>
  <!-- ground contact -->
  <ellipse cx="512" cy="752" rx="235" ry="16" fill="#EADBBD"/>

  <g transform="rotate(-38 512 500)">
    <!-- wand shaft: tapered -->
    <path d="M 304 526 L 716 488 Q 730 498 716 512 L 304 562 Q 282 546 304 526 Z" fill="#8C6239"/>
    <path d="M 304 526 L 716 488 Q 723 493 716 498 L 306 540 Q 292 534 304 526 Z" fill="#A87844"/>
    <!-- spiral carved handle -->
    <path d="M 296 522 L 420 512 L 426 568 L 300 566 Q 278 544 296 522 Z" fill="#6E5238"/>
    <g stroke="#5C4530" stroke-width="5" stroke-linecap="round">
      <path d="M 318 518 Q 328 540 322 566"/>
      <path d="M 352 516 Q 362 538 356 564"/>
      <path d="M 386 514 Q 396 534 390 560"/>
    </g>
    <path d="M 304 524 Q 314 522 326 521" stroke="#8C6239" stroke-width="4" stroke-linecap="round"/>
    <!-- gold band where handle meets shaft -->
    <rect x="418" y="504" width="22" height="64" rx="9" fill="#D9A856"/>
    <rect x="424" y="504" width="6" height="64" fill="#C28F3F"/>
    <!-- pommel gem at handle end -->
    <circle cx="290" cy="544" r="20" fill="#C28F3F"/>
    <circle cx="290" cy="544" r="13" fill="#A98BC4"/>
    <circle cx="286" cy="540" r="4.5" fill="#D9C8EA"/>
    <!-- shaft highlight -->
    <line x1="448" y1="510" x2="600" y2="496" stroke="#C9A06A" stroke-width="4" stroke-linecap="round"/>
    <!-- glowing tip -->
    <circle cx="724" cy="500" r="26" fill="#F6E4B4" opacity="0.7"/>
    <circle cx="724" cy="500" r="13" fill="#FBF3DC"/>
  </g>

  <!-- magic trail from tip: arc of sparkles -->
  <g>
    <path d="M 700 280 L 710 306 L 736 316 L 710 326 L 700 352 L 690 326 L 664 316 L 690 306 Z" fill="#E5C878"/>
    <path d="M 626 222 L 632 238 L 648 244 L 632 250 L 626 266 L 620 250 L 604 244 L 620 238 Z" fill="#C7B3DC"/>
    <path d="M 540 190 L 545 203 L 558 208 L 545 213 L 540 226 L 535 213 L 522 208 L 535 203 Z" fill="#F6C6CB"/>
    <circle cx="664" cy="252" r="6" fill="#E5C878" opacity="0.85"/>
    <circle cx="586" cy="200" r="5" fill="#C7B3DC" opacity="0.85"/>
    <circle cx="494" cy="186" r="4" fill="#E5C878" opacity="0.7"/>
  </g>
</svg>
