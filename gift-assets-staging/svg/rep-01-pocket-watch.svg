  <circle cx="512" cy="630" r="160" fill="none" stroke="#C28F3F" stroke-width="3"/>
  <circle cx="512" cy="630" r="152" fill="#FBF6EA"/>
  <circle cx="512" cy="630" r="126" fill="none" stroke="#E7DABC" stroke-width="2.5"/>
