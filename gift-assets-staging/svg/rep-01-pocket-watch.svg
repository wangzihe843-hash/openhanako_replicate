    <ellipse cx="512" cy="248" rx="11" ry="18"/>
    <ellipse cx="512" cy="281" rx="11" ry="18"/>
    <ellipse cx="512" cy="314" rx="11" ry="18"/>
    <ellipse cx="512" cy="347" rx="11" ry="18"/>
  </g>
  <circle cx="512" cy="374" r="23" fill="none" stroke="#C28F3F" stroke-width="11"/>
