  <g stroke="#5A4636" stroke-linecap="round">
    <line x1="512" y1="490" x2="512" y2="512" stroke-width="6"/>
    <line x1="512" y1="490" x2="512" y2="512" stroke-width="6" transform="rotate(90 512 630)"/>
    <line x1="512" y1="490" x2="512" y2="512" stroke-width="6" transform="rotate(180 512 630)"/>
