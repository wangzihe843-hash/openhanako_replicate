  <!-- case highlight + lower inner shading -->
  <path d="M337,566 A186,186 0 0 1 448,455" stroke="#FFFFFF" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M420,790 Q512,828 604,790" stroke="#A87844" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
