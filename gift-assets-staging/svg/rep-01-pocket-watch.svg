    <line x1="512" y1="490" x2="512" y2="504" stroke-width="4" transform="rotate(120 512 630)"/>
    <line x1="512" y1="490" x2="512" y2="504" stroke-width="4" transform="rotate(150 512 630)"/>
    <line x1="512" y1="490" x2="512" y2="504" stroke-width="4" transform="rotate(210 512 630)"/>
    <line x1="512" y1="490" x2="512" y2="504" stroke-width="4" transform="rotate(240 512 630)"/>
