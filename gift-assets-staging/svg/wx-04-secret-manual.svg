<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#FAF3E6"/>

  <!-- faint aura -->
  <circle cx="512" cy="500" r="266" fill="#F5E9C9" opacity="0.45"/>
  <circle cx="512" cy="500" r="210" fill="#F2E3BC" opacity="0.4"/>

  <!-- long cast shadow -->
  <rect x="418" y="368" width="308" height="358" rx="10" fill="#F1E3C9"/>
  <!-- ground contact -->
  <ellipse cx="512" cy="742" rx="210" ry="15" fill="#EADBBD"/>

  <!-- page block (bottom + right edges) -->
  <rect x="368" y="334" width="302" height="362" rx="8" fill="#E8DCC4"/>
  <g stroke="#D9CBAE" stroke-width="2.5">
    <line x1="372" y1="690" x2="664" y2="690"/>
    <line x1="374" y1="684" x2="662" y2="684"/>
    <line x1="664" y1="340" x2="664" y2="688"/>
    <line x1="658" y1="344" x2="658" y2="684"/>
  </g>

  <!-- cover -->
  <rect x="358" y="322" width="308" height="360" rx="8" fill="#5C6B85"/>
  <!-- subtle fabric weave -->
  <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.06">
    <line x1="358" y1="380" x2="666" y2="360"/>
    <line x1="358" y1="440" x2="666" y2="420"/>
    <line x1="358" y1="500" x2="666" y2="480"/>
    <line x1="358" y1="560" x2="666" y2="540"/>
    <line x1="358" y1="620" x2="666" y2="600"/>
  </g>
  <!-- cover edge light (top-left) -->
  <path d="M 358 330 Q 358 322 366 322 L 600 322 L 600 330 L 366 330 Q 362 330 362 334 L 362 560 L 358 560 Z" fill="#6B7A94"/>
  <!-- corner wear -->
  <path d="M 358 612 Q 392 640 396 682 L 366 682 Q 358 660 358 612 Z" fill="#4E5A74" opacity="0.7"/>
  <path d="M 600 322 L 612 322 Q 606 334 600 336 Z" fill="#6B7A94" opacity="0.8"/>

  <!-- spine band (right, traditional stitched binding) -->
  <rect x="612" y="322" width="54" height="360" fill="#4E5A74"/>
  <line x1="612" y1="326" x2="612" y2="678" stroke="#3F4A60" stroke-width="3"/>
  <!-- stitch holes -->
  <g fill="#3F4A60">
    <circle cx="656" cy="356" r="4"/>
    <circle cx="656" cy="453" r="4"/>
    <circle cx="656" cy="550" r="4"/>
    <circle cx="656" cy="648" r="4"/>
  </g>
  <!-- stitch threads: edge thread + horizontal wraps -->
  <g stroke="#F2E9D8" stroke-width="5" stroke-linecap="round">
    <line x1="656" y1="356" x2="656" y2="648"/>
    <line x1="620" y1="356" x2="666" y2="356"/>
    <line x1="620" y1="453" x2="666" y2="453"/>
    <line x1="620" y1="550" x2="666" y2="550"/>
    <line x1="620" y1="648" x2="666" y2="648"/>
  </g>
  <g stroke="#D9CBAE" stroke-width="2" stroke-linecap="round">
    <line x1="620" y1="359" x2="666" y2="359"/>
    <line x1="620" y1="456" x2="666" y2="456"/>
    <line x1="620" y1="553" x2="666" y2="553"/>
    <line x1="620" y1="651" x2="666" y2="651"/>
  </g>

  <!-- blank title slip with double border -->
  <rect x="388" y="348" width="66" height="174" rx="5" fill="#F2E9D8"/>
  <rect x="388" y="348" width="66" height="174" rx="5" fill="none" stroke="#D9CBAE" stroke-width="3"/>
  <rect x="395" y="356" width="52" height="158" rx="3" fill="none" stroke="#E5DAC0" stroke-width="2"/>
  <!-- small red seal at slip bottom -->
  <rect x="406" y="478" width="28" height="28" rx="5" fill="#C9574C"/>
  <rect x="411" y="483" width="18" height="18" rx="3" fill="none" stroke="#A8362E" stroke-width="2.5"/>

  <!-- drifting glow sparkles -->
  <path d="M 696 314 L 702 332 L 720 338 L 702 344 L 696 362 L 690 344 L 672 338 L 690 332 Z" fill="#E5C878"/>
  <path d="M 330 280 L 334 292 L 346 296 L 334 300 L 330 312 L 326 300 L 314 296 L 326 292 Z" fill="#E5C878" opacity="0.85"/>
  <circle cx="706" cy="430" r="6" fill="#E5C878" opacity="0.7"/>
  <circle cx="346" cy="560" r="5" fill="#E5C878" opacity="0.6"/>
  <circle cx="384" cy="262" r="4" fill="#E5C878" opacity="0.5"/>
</svg>
